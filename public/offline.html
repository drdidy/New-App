<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080706" />
    <title>Money Coach — offline</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 28px;
        background: radial-gradient(140% 140% at 50% 30%, #14110e 0%, #0b0a09 60%, #080706 100%);
        color: #f1e9d8;
        font-family: Georgia, "Times New Roman", serif;
        text-align: center;
      }
      main { max-width: 420px; }
      .seal {
        width: 58px; height: 58px; border-radius: 17px; margin: 0 auto 22px;
        display: grid; place-items: center; font-weight: 700; font-size: 21px; color: #1c1305;
        background: linear-gradient(135deg, #f2d391 0%, #dcab52 55%, #b8862e 100%);
        box-shadow: 0 14px 34px -12px rgba(184, 134, 46, 0.7);
      }
      h1 { margin: 0 0 4px; font-weight: 600; font-size: 30px; letter-spacing: -0.01em; }
      h1 em { font-style: italic; color: #e2b366; }
      .rule {
        height: 5px; margin: 18px auto 18px; max-width: 240px;
        border-top: 1px solid rgba(226, 179, 102, 0.22);
        border-bottom: 1px solid rgba(241, 233, 216, 0.1);
      }
      p {
        line-height: 1.65; margin: 0 0 24px; color: #978d78; font-size: 15px;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      p b { color: #cfc5ad; }
      a {
        display: inline-block; padding: 13px 22px; border-radius: 13px;
        background: linear-gradient(135deg, #f2d391 0%, #dcab52 55%, #b8862e 100%);
        color: #1c1305; font-weight: 800; text-decoration: none; font-size: 14.5px;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        box-shadow: 0 14px 30px -14px rgba(184, 134, 46, 0.7);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="seal">MC</div>
      <h1>The press is <em>paused.</em></h1>
      <div class="rule"></div>
      <p>You're offline. Your money lives <b>on this device</b>, so cached pages still open — but the coach, receipt scanning, and sync need a connection.</p>
      <a href="/">Return to Today</a>
    </main>
  </body>
</html>
