<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Money Coach Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fbf6f1;
        color: #18322d;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        max-width: 420px;
        border: 1px solid rgba(24, 50, 45, 0.16);
        border-radius: 12px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.74);
        box-shadow: 0 18px 60px rgba(24, 50, 45, 0.12);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.4rem;
      }
      p {
        line-height: 1.5;
        margin: 0 0 16px;
      }
      a {
        color: #a75535;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Money Coach can reopen cached screens, but AI, receipt scanning, and sync need a connection.</p>
      <a href="/">Return home</a>
    </main>
  </body>
</html>
